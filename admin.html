<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель заказов</title>

    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
</head>

<body>

<div class="container admin-container">

    <h1>Заказы</h1>

    <div class="admin-nav">
        <button id="showOrdersBtn" class="nav-btn active">
            📦 Заказы
        </button>
        <button id="showReviewsBtn" class="nav-btn">
            ⭐ Отзывы
        </button>
    </div>

    <section id="ordersSection">

        <input
            id="searchOrder"
            type="search"
            placeholder="Поиск по имени, телефону или номеру заказа">

        <div class="dashboard">

            <div class="stat-card">
                <h3>Заказов</h3>
                <span id="ordersCount">0</span>
            </div>

            <div class="stat-card">
                <h3>Продажи</h3>
                <span id="salesTotal">0 ₴</span>
            </div>

            <div class="stat-card">
                <h3>Новых</h3>
                <span id="newOrders">0</span>
            </div>

            <div class="stat-card">
                <h3>Сегодня</h3>
                <span id="todayOrders">0</span>
            </div>

        </div>

        <table class="orders-table">

            <thead>

            <tr>
                <th>№</th>
                <th>Имя</th>
                <th>Телефон</th>
                <th>Сумма</th>
                <th>Статус</th>
                <th>Дата</th>
                <th>Действия</th>
            </tr>

            </thead>

            <tbody id="ordersBody">

            </tbody>

        </table>

    </section>

    <section id="reviewsSection" style="display:none;">

        <h2>Отзывы</h2>

        <table class="admin-table">

            <thead>
                <tr>
                    <th>Имя</th>
                    <th>Оценка</th>
                    <th>Отзыв</th>
                    <th>Дата</th>
                    <th>Статус</th>
                    <th>Действия</th>
                </tr>
            </thead>

            <tbody id="reviewsTable"></tbody>

        </table>

    </section>

</div>

<script src="js/admin.js"></script>

</body>
</html>
